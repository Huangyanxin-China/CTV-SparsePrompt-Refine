name: Bug report
description: Report a reproducible problem in the public code
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Do not attach clinical data, identifiers, private paths, or credentials.
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened, and what did you expect?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      description: Provide a command or synthetic example.
      render: shell
    validations:
      required: true
  - type: input
    id: commit
    attributes:
      label: Commit SHA
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Python, operating system, CPU/GPU, and relevant package versions.
    validations:
      required: true
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy confirmation
      options:
        - label: I removed clinical data, identifiers, credentials, and private paths.
          required: true
