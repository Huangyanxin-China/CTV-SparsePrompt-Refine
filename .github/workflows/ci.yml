name: Python CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: python-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  OMP_NUM_THREADS: "1"
  MKL_NUM_THREADS: "1"
  PYTHONPATH: ${{ github.workspace }}:${{ github.workspace }}/scripts

jobs:
  tests:
    name: Python 3.10 CPU
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: |
            requirements-test.txt
            requirements-dev.txt

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-test.txt -r requirements-dev.txt
          python -m pip install --index-url https://download.pytorch.org/whl/cpu "torch>=2.1,<3"
          python -m pip check

      - name: Reject private medical and model artifacts
        shell: bash
        run: |
          forbidden="$(git ls-files | grep -Ei '\.(nii(\.gz)?|dcm|pt|pth|ckpt|npz)$' || true)"
          if [[ -n "$forbidden" ]]; then
            echo "Forbidden data or model artifacts are tracked:"
            echo "$forbidden"
            exit 1
          fi

      - name: Compile Python sources
        run: python -m compileall -q models scripts utils tests

      - name: Run static checks
        run: ruff check models scripts utils tests

      - name: Run unit tests
        run: python -m pytest -q --maxfail=1
