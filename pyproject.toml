[tool.pytest.ini_options]
minversion = "8.0"
testpaths = ["tests"]
addopts = "-ra --strict-markers"
filterwarnings = [
  "error",
  "ignore:.*SwigPy.*:DeprecationWarning",
]

[tool.ruff]
target-version = "py310"
line-length = 120
extend-exclude = ["site"]

[tool.ruff.lint]
select = ["E4", "E7", "E9", "F"]
ignore = ["E501"]

[tool.coverage.run]
branch = true
source = ["models", "scripts", "utils"]

[tool.coverage.report]
show_missing = true
skip_covered = true
